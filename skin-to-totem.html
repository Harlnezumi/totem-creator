<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skin to Totem</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.min.js"></script>
    <script>
      var OggVorbisEncoderConfig = { TOTAL_MEMORY: 67108864 };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/higuma/ogg-vorbis-encoder-js@master/lib/OggVorbisEncoder.js"></script>

    <style>
      :root {
        --primary: #43b581;
        --primary-hover: #3ca374;
        --bg-color: #202225;
        --card-bg: rgba(32, 34, 37, 0.95);
        --input-bg: rgba(0, 0, 0, 0.2);
        --border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --text-muted: #b9bbbe;
        --error-color: #ef4444;
        --success-color: #22c55e;
        --nav-height: 70px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-color);
        background-image: url(background.png);
        background-repeat: no-repeat;
        background-position: center;
        background-size: cover;
        background-attachment: fixed;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        overflow-y: auto;
        color: var(--text-main);
        padding-top: calc(var(--nav-height) + 40px);
        padding-bottom: 40px;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        z-index: -1;
      }

      /* Navigation */
      .topnav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: var(--nav-height);
        padding: 0 2rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        z-index: 1000;
        background: rgba(32, 34, 37, 0.6);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 40px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 800;
        font-size: 1.4rem;
        letter-spacing: -0.5px;
        text-decoration: none;
      }
      .brand span {
        background: linear-gradient(to bottom, #ffffff, #e2e8f0);
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.15));
      }
      .brand img {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(67, 181, 129, 0.4);
      }
      .nav-links {
        display: flex;
        gap: 5px;
      }
      .nav-btn {
        text-decoration: none;
        color: var(--text-muted);
        font-weight: 600;
        padding: 8px 16px;
        border-radius: 8px;
        transition: all 0.2s;
        font-size: 0.95rem;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        color: white;
      }
      .nav-btn.active {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .kofi-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background-color: #ff5e5b;
        color: white;
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.9rem;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(255, 94, 91, 0.3);
      }
      .kofi-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 94, 91, 0.5);
      }
      .kofi-btn svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.5;
      }

      /* Toasts */
      #toast-container {
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 10001;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      }
      .toast {
        pointer-events: auto;
        min-width: 300px;
        max-width: 400px;
        background: #2f3136;
        border: 1px solid var(--border);
        border-left: 4px solid;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        gap: 12px;
        opacity: 0;
        transform: translateX(100%);
        animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .toast.error {
        border-left-color: var(--error-color);
      }
      .toast.error svg {
        fill: var(--error-color);
      }
      .toast.success {
        border-left-color: var(--success-color);
      }
      .toast.success svg {
        fill: var(--success-color);
      }
      .toast-content {
        font-size: 0.95rem;
        color: #fff;
        font-weight: 500;
      }
      @keyframes slideIn {
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes slideOut {
        to {
          opacity: 0;
          transform: translateX(100%);
        }
      }

      /* Loader */
      #loading-screen {
        position: fixed;
        inset: 0;
        background-color: var(--bg-color);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.8s ease;
      }
      .loader {
        width: 60px;
        aspect-ratio: 1;
        --g1: conic-gradient(
          from 90deg at 3px 3px,
          #0000 90deg,
          var(--primary) 0
        );
        --g2: conic-gradient(
          from -90deg at 22px 22px,
          #0000 90deg,
          var(--primary) 0
        );
        background:
          var(--g1), var(--g1), var(--g1), var(--g2), var(--g2), var(--g2);
        background-size: 25px 25px;
        background-repeat: no-repeat;
        animation: l7 1.5s infinite;
      }
      .loader-text {
        font-size: 1.2rem;
        margin-top: 25px;
        color: var(--text-muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
      }
      @keyframes l7 {
        0% {
          background-position:
            0 0,
            0 100%,
            100% 100%;
        }
        25% {
          background-position:
            100% 0,
            0 100%,
            100% 100%;
        }
        50% {
          background-position:
            100% 0,
            0 0,
            100% 100%;
        }
        75% {
          background-position:
            100% 0,
            0 0,
            0 100%;
        }
        100% {
          background-position:
            100% 100%,
            0 0,
            0 100%;
        }
      }
      .fadeOut {
        opacity: 0;
        pointer-events: none;
      }

      /* Main Container */
      .container {
        position: relative;
        margin-top: 0;
        width: 95%;
        max-width: 1000px;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        opacity: 0;
        transform: translateY(20px);
        animation: fadeInUp 0.8s ease forwards 0.3s;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      @keyframes fadeInUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .reset-button {
        position: absolute;
        top: 30px;
        right: 30px;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 6px 12px;
        gap: 8px;
        height: 34px;
        width: auto;
        border: none;
        background: rgba(255, 54, 43, 0.1);
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s ease;
        z-index: 10;
      }
      .lable {
        font-size: 14px;
        font-weight: 600;
        color: #ff342b;
      }
      .reset-button:hover {
        background: rgba(255, 54, 43, 0.2);
      }
      .reset-button:hover .svg-icon {
        animation: spin 2s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(-360deg);
        }
      }

      h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        text-transform: uppercase;
        background: linear-gradient(to right, #fff, #b9bbbe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2rem;
      }

      /* --- LAYOUT --- */
      .main-grid {
        display: grid;
        grid-template-columns: 1fr 1.3fr;
        gap: 2rem;
      }
      @media (max-width: 768px) {
        .main-grid {
          grid-template-columns: 1fr;
        }
      }

      .input-section {
        display: flex;
        flex-direction: column;
      }

      /* Drag Zone Mini */
      .drop-zone-mini {
        background: var(--input-bg);
        border: 2px dashed var(--border);
        border-radius: 12px;
        height: 110px;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        padding: 10px;
      }
      .drop-zone-mini:hover {
        border-color: var(--primary);
        background: rgba(67, 181, 129, 0.1);
      }
      .drop-zone-mini input {
        display: none;
      }
      .drop-zone-mini svg {
        width: 32px;
        fill: var(--text-muted);
      }
      .drop-zone-text h4 {
        font-size: 0.95rem;
        color: white;
        margin-bottom: 2px;
      }
      .drop-zone-text p {
        font-size: 0.8rem;
        color: var(--text-muted);
      }

      /* OR Divider */
      .or-divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        color: var(--text-muted);
        font-size: 0.85rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .or-divider span {
        padding: 0 12px;
      }

      /* Inputs */
      .skin-input-group {
        display: flex;
        gap: 8px;
        margin-bottom: 1.5rem;
      }
      .text-input,
      select {
        width: 100%;
        padding: 12px 16px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: white;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }
      .text-input:focus,
      select:focus {
        border-color: var(--primary);
      }

      .btn-fetch {
        background: var(--primary);
        color: white;
        border: none;
        padding: 0 20px;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      .btn-fetch:hover {
        background: var(--primary-hover);
      }

      /* --- Custom Dropdown Style --- */
      .style-label {
        margin-bottom: 0.5rem;
        display: block;
        font-weight: 600;
        color: var(--text-muted);
      }

      .custom-dropdown {
        position: relative;
        width: 100%;
        margin-bottom: 1rem;
      }
      .dropdown-trigger {
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 15px;
        display: flex;
        align-items: center;
        gap: 15px;
        cursor: pointer;
        transition: border-color 0.2s;
        height: 60px;
      }
      .dropdown-trigger:hover {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .dropdown-trigger.open {
        border-color: var(--primary);
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }

      .dropdown-icon {
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .dropdown-icon img {
        width: 100%;
        height: auto;
        image-rendering: pixelated;
      }

      .dropdown-text {
        flex: 1;
      }
      .dropdown-text h4 {
        font-size: 0.95rem;
        color: white;
        margin-bottom: 2px;
      }
      .dropdown-text p {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .dropdown-arrow {
        transition: transform 0.3s;
      }
      .dropdown-trigger.open .dropdown-arrow {
        transform: rotate(180deg);
      }

      .dropdown-options {
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #202225; /* Solid bg to cover content below */
        border: 1px solid var(--border);
        border-top: none;
        border-bottom-left-radius: 8px;
        border-bottom-right-radius: 8px;
        z-index: 50;
        display: none;
        overflow: hidden;
      }
      .dropdown-options.show {
        display: block;
      }

      .dropdown-option {
        padding: 10px 15px;
        display: flex;
        align-items: center;
        gap: 15px;
        cursor: pointer;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        transition: background 0.2s;
      }
      .dropdown-option:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      /* Checkbox Styling (Original Code) */
      .checkbox-wrapper {
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        position: relative;
        margin-top: 5px;
        padding: 8px 0;
        width: 100%;
      }
      .checkbox-input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        cursor: pointer;
      }
      .checkbox-visual {
        position: relative;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 2px solid var(--text-muted);
        background-color: transparent;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        z-index: 2;
      }
      .checkbox-wrapper:hover .checkbox-visual {
        border-color: var(--primary);
        box-shadow: 0 0 0 8px rgba(67, 181, 129, 0.15);
      }
      .checkbox-input:checked + .checkbox-visual {
        background-color: var(--primary);
        border-color: var(--primary);
        box-shadow: 0 4px 12px rgba(67, 181, 129, 0.4);
      }
      .checkbox-visual svg {
        width: 14px;
        height: 14px;
        fill: white;
        opacity: 0;
        transform: scale(0.5);
        transition: all 0.2s cubic-bezier(0.12, 0.4, 0.29, 1.46);
      }
      .checkbox-input:checked + .checkbox-visual svg {
        opacity: 1;
        transform: scale(1);
      }
      .checkbox-label-content {
        margin-left: 12px;
        display: flex;
        flex-direction: column;
      }
      .checkbox-main-text {
        font-size: 0.95rem;
        color: var(--text-muted);
        font-weight: 500;
        transition: color 0.2s;
      }
      .checkbox-input:checked ~ .checkbox-label-content .checkbox-main-text {
        color: white;
      }
      .checkbox-subtext {
        font-size: 0.75rem;
        color: #72767d;
        font-weight: 400;
        margin-top: 2px;
      }

      /* Preview Area (No Hover Animation) */
      .main-preview-area {
        width: 100%;
        height: 100%;
        background: var(--input-bg);
        border: 2px dashed var(--border);
        border-radius: 16px;
        min-height: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .main-preview-area img {
        height: 280px;
        width: auto;
        image-rendering: pixelated;
        filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        /* Animation removed */
      }

      /* Extras & Bottom */
      .bottom-section {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }
      optgroup {
        background: #2f3136;
      }

      .advanced-settings {
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.15);
        transition: border-color 0.3s;
      }
      .advanced-settings[open] {
        border-color: var(--primary);
      }
      .advanced-settings summary {
        padding: 1rem;
        cursor: pointer;
        font-weight: 700;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: space-between;
        list-style: none;
        transition: color 0.3s;
      }
      .advanced-settings summary:hover {
        color: white;
        background: rgba(255, 255, 255, 0.02);
      }
      .advanced-settings summary::after {
        content: "+";
        font-size: 1.2rem;
        font-weight: bold;
        transition: transform 0.3s;
      }
      .advanced-settings[open] summary::after {
        transform: rotate(45deg);
      }
      .settings-content {
        padding: 1.5rem;
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr;
        gap: 15px;
        animation: slideDown 0.3s ease;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .drop-zone-extra {
        background: var(--input-bg);
        border: 1px dashed var(--border);
        border-radius: 8px;
        height: 80px;
        display: flex;
        align-items: center;
        padding: 0 15px;
        gap: 15px;
        cursor: pointer;
      }
      .drop-zone-extra:hover {
        border-color: var(--primary);
      }
      .drop-zone-extra input {
        display: none;
      }

      .preview-media-small {
        display: none;
        align-items: center;
        gap: 10px;
        width: 100%;
        overflow: hidden;
      }
      .preview-media-small img {
        width: 40px;
        height: 40px;
      }
      .file-name-small {
        font-size: 0.8rem;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* Download Button (Restored from index.html) */
      .btn-download {
        width: 100%;
        padding: 1rem;
        border: none;
        border-radius: 8px;
        background: var(--primary);
        color: white;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition:
          transform 0.2s,
          background 0.2s;
      }
      .btn-download:hover {
        background: var(--primary-hover);
        transform: translateY(-2px);
      }
      .btn-download:active {
        transform: translateY(0);
      }
      .btn-download svg {
        width: 24px;
        fill: white;
      }

      /* Progress Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 10000;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
      }
      .modal-content {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        border: 1px solid var(--border);
        width: 90%;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .progress-container {
        width: 100%;
        height: 8px;
        background-color: var(--input-bg);
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        background-color: var(--primary);
        transition: width 0.3s ease;
      }

      .input-error {
        border-color: var(--error-color) !important;
        animation: shake 0.5s;
      }
      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-5px);
        }
        75% {
          transform: translateX(5px);
        }
      }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="loader"></div>
      <div class="loader-text">Loading...</div>
    </div>
    <div id="toast-container"></div>

    <div class="topnav">
      <div class="nav-left">
        <a href="index.html" class="brand">
          <img src="avatar.png" alt="Logo" />
          <span>Totem Generator</span>
        </a>
        <nav class="nav-links">
          <a href="index.html" class="nav-btn">Generator</a>
          <a href="skin.html" class="nav-btn active">Skin to Totem</a>
        </nav>
      </div>
      <a href="https://ko-fi.com/harinezumi" target="_blank" class="kofi-btn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
          <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
          <line x1="6" y1="1" x2="6" y2="4"></line>
          <line x1="10" y1="1" x2="10" y2="4"></line>
          <line x1="14" y1="1" x2="14" y2="4"></line>
        </svg>
        <span>Buy me a Coffee</span>
      </a>
    </div>

    <div class="container">
      <button
        class="reset-button"
        onclick="resetForm()"
        title="Reset all fields"
      >
        <svg
          class="svg-icon"
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#ff342b"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
          <path d="M3 3v5h5"></path>
        </svg>
        <span class="lable">Reset</span>
      </button>

      <h1>Skin to Totem</h1>

      <div class="main-grid">
        <div class="input-section">
          <label class="drop-zone-mini" id="drop-skin">
            <div
              class="initial-content"
              style="display: flex; align-items: center; gap: 12px"
            >
              <svg viewBox="0 0 24 24">
                <path
                  d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
                />
              </svg>
              <div class="drop-zone-text">
                <h4>Drag Skin Img</h4>
                <p>Or click to upload</p>
              </div>
            </div>
            <div class="preview-media-small"></div>
            <input type="file" id="skin-file-input" accept="image/*" />
          </label>

          <div class="or-divider"><span>OR</span></div>

          <div class="skin-input-group">
            <input
              type="text"
              id="username-input"
              class="text-input"
              placeholder="Username"
            />
            <button class="btn-fetch" onclick="fetchSkin()">Load</button>
          </div>

          <label class="style-label">Style</label>
          <div class="custom-dropdown" id="style-dropdown">
            <div class="dropdown-trigger" onclick="toggleDropdown()">
              <div class="dropdown-icon">
                <img
                  src="img/steve-tiny-preview.png"
                  id="selected-style-icon"
                  alt="icon"
                />
              </div>
              <div class="dropdown-text">
                <h4 id="selected-style-title">Mini me</h4>
                <p id="selected-style-desc">A mini version of your skin!</p>
              </div>
              <div class="dropdown-arrow">
                <svg
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M6 9l6 6 6-6" />
                </svg>
              </div>
            </div>
            <div class="dropdown-options">
              <div class="dropdown-option" onclick="selectStyle('mini')">
                <div class="dropdown-icon">
                  <img src="img/steve-tiny-preview.png" alt="mini" />
                </div>
                <div class="dropdown-text">
                  <h4>Mini me</h4>
                  <p>A mini version of your skin!</p>
                </div>
              </div>
              <div class="dropdown-option" onclick="selectStyle('full')">
                <div class="dropdown-icon">
                  <img src="img/steve-big-preview.png" alt="full" />
                </div>
                <div class="dropdown-text">
                  <h4>Full body</h4>
                  <p>A full version of your skin!</p>
                </div>
              </div>
            </div>
          </div>

          <label class="checkbox-wrapper" for="outer-layer-check">
            <input
              type="checkbox"
              id="outer-layer-check"
              class="checkbox-input"
              checked
              onchange="fetchSkinIfUsername()"
            />
            <div class="checkbox-visual">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 20 20"
                fill="currentColor"
              >
                <path
                  fill-rule="evenodd"
                  d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                  clip-rule="evenodd"
                ></path>
              </svg>
            </div>
            <div class="checkbox-label-content">
              <span class="checkbox-main-text">Outer Layer</span>
              <span class="checkbox-subtext"
                >Include hat and jacket layers</span
              >
            </div>
          </label>
        </div>

        <div class="main-preview-area" id="skin-preview">
          <img
            src="img/steve-tiny-preview.png"
            id="main-preview-img"
            alt="Preview"
          />
        </div>
      </div>

      <div class="bottom-section">
        <div>
          <label
            style="
              margin-bottom: 0.5rem;
              display: block;
              font-weight: 600;
              color: var(--text-muted);
            "
            >Target Version</label
          >
          <select id="version-select">
            <option value="" disabled selected>
              Select Minecraft Version...
            </option>
            <optgroup label="1.21 (Tricky Trials)">
              <option value="46">1.21.4</option>
              <option value="42">1.21.2 - 1.21.3</option>
              <option value="34">1.21 - 1.21.1</option>
            </optgroup>
            <optgroup label="1.20 (Trails & Tales)">
              <option value="32">1.20.5 - 1.20.6</option>
              <option value="22">1.20.3 - 1.20.4</option>
              <option value="18">1.20.2</option>
              <option value="15">1.20 - 1.20.1</option>
            </optgroup>
            <optgroup label="1.19 (The Wild Update)">
              <option value="13">1.19.4</option>
              <option value="12">1.19.3</option>
              <option value="9">1.19 - 1.19.2</option>
            </optgroup>
          </select>
        </div>

        <details class="advanced-settings">
          <summary>Extra Settings</summary>
          <div class="settings-content">
            <label class="drop-zone-extra" id="drop-ogg">
              <div
                class="initial-content"
                style="display: flex; align-items: center; gap: 10px"
              >
                <svg
                  style="width: 24px; fill: var(--text-muted)"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"
                  />
                </svg>
                <span style="color: var(--text-muted); font-weight: 600"
                  >Sound (.ogg)</span
                >
              </div>
              <div class="preview-media-small"></div>
              <input type="file" id="sound" accept="audio/*" />
            </label>

            <label class="drop-zone-extra" id="drop-icon">
              <div
                class="initial-content"
                style="display: flex; align-items: center; gap: 10px"
              >
                <svg
                  style="width: 24px; fill: var(--text-muted)"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"
                  />
                </svg>
                <span style="color: var(--text-muted); font-weight: 600"
                  >Pack Icon</span
                >
              </div>
              <div class="preview-media-small"></div>
              <input type="file" id="pack-icon-input" accept="image/png" />
            </label>

            <div style="grid-column: span 2">
              <input
                type="text"
                id="pack-name"
                class="text-input"
                placeholder="Pack Name (e.g. My Skin Totem)"
              />
            </div>
            <div style="grid-column: span 2">
              <input
                type="text"
                id="pack-desc"
                class="text-input"
                placeholder="Pack Description"
              />
            </div>
          </div>
        </details>

        <button class="btn-download" onclick="generatePack()">
          <svg viewBox="0 0 24 24">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
          </svg>
          Download Resource Pack
        </button>
      </div>
    </div>

    <div id="progress-modal" class="modal-overlay">
      <div class="modal-content">
        <h3>Processing...</h3>
        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <p id="progress-text">0%</p>
      </div>
    </div>

    <script>
      const DEFAULTS = { sound: "./sound_totem.ogg", icon: "./pack.png" };
      let currentSkinBlob = null;
      let selectedStyle = "mini";

      window.addEventListener("load", () => {
        document
          .getElementById("version-select")
          .addEventListener("change", function () {
            this.classList.remove("input-error");
          });
        setTimeout(() => {
          document.getElementById("loading-screen").classList.add("fadeOut");
          setTimeout(
            () =>
              (document.getElementById("loading-screen").style.display =
                "none"),
            800,
          );
        }, 800);
        document
          .getElementById("username-input")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") fetchSkin();
          });

        // Close dropdown when clicking outside
        document.addEventListener("click", function (e) {
          const dropdown = document.getElementById("style-dropdown");
          const trigger = dropdown.querySelector(".dropdown-trigger");
          const options = dropdown.querySelector(".dropdown-options");
          if (!dropdown.contains(e.target)) {
            options.classList.remove("show");
            trigger.classList.remove("open");
          }
        });
      });

      function showToast(message, type = "error") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        const iconPath =
          type === "error"
            ? "M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            : "M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z";
        toast.innerHTML = `<svg style="width:24px; height:24px" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="${iconPath}" clip-rule="evenodd"/></svg><span class="toast-content">${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.style.animation = "slideOut 0.4s ease forwards";
          toast.addEventListener("animationend", () => toast.remove());
        }, 4000);
      }

      // --- Dropdown Logic ---
      function toggleDropdown() {
        const trigger = document.querySelector(".dropdown-trigger");
        const options = document.querySelector(".dropdown-options");
        trigger.classList.toggle("open");
        options.classList.toggle("show");
      }

      function selectStyle(style) {
        selectedStyle = style;

        // Update Trigger UI
        const icon = document.getElementById("selected-style-icon");
        const title = document.getElementById("selected-style-title");
        const desc = document.getElementById("selected-style-desc");

        if (style === "mini") {
          icon.src = "img/steve-tiny-preview.png";
          title.textContent = "Mini me";
          desc.textContent = "A mini version of your skin!";
        } else {
          icon.src = "img/steve-big-preview.png";
          title.textContent = "Full body";
          desc.textContent = "A full version of your skin!";
        }

        toggleDropdown(); // Close menu

        // Update logic
        const username = document.getElementById("username-input").value.trim();
        if (username) {
          fetchSkin(); // Refetch if username exists
        } else {
          // Update the Steve placeholder if no user is loaded
          const img = document.getElementById("main-preview-img");
          if (img)
            img.src =
              style === "mini"
                ? "img/steve-tiny-preview.png"
                : "img/steve-big-preview.png";
        }
      }

      // --- Checkbox Logic ---
      function fetchSkinIfUsername() {
        const username = document.getElementById("username-input").value.trim();
        if (username) fetchSkin();
      }

      // --- Drag & Drop ---
      function initDropZone(zoneId, inputId) {
        const zone = document.getElementById(zoneId);
        const input = document.getElementById(inputId);
        const initial = zone.querySelector(".initial-content");
        const isSmall =
          zone.classList.contains("drop-zone-extra") ||
          zone.classList.contains("drop-zone-mini");
        const preview = isSmall
          ? zone.querySelector(".preview-media-small")
          : null;

        ["dragenter", "dragover", "dragleave", "drop"].forEach((eName) =>
          zone.addEventListener(
            eName,
            (e) => {
              e.preventDefault();
              e.stopPropagation();
            },
            false,
          ),
        );
        zone.addEventListener(
          "dragenter",
          () => (zone.style.borderColor = "var(--primary)"),
        );
        zone.addEventListener(
          "dragleave",
          () => (zone.style.borderColor = "var(--border)"),
        );
        zone.addEventListener("drop", (e) => {
          zone.style.borderColor = "var(--border)";
          if (e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files);
          }
        });
        input.addEventListener("change", (e) => handleFiles(e.target.files));

        function handleFiles(files) {
          if (!files.length) return;
          const file = files[0];
          const isImg = file.type.startsWith("image/");

          if (inputId === "skin-file-input") {
            if (!isImg) return showToast("Upload an image file", "error");
            currentSkinBlob = file;
            updateMainPreview(file);
            document.getElementById("username-input").value = "";
          } else {
            initial.style.display = "none";
            preview.style.display = "flex";
            preview.innerHTML = "";

            const info = document.createElement("div");
            info.className = "file-name-small";
            info.textContent = file.name;

            if (isImg) {
              const img = document.createElement("img");
              img.src = URL.createObjectURL(file);
              preview.appendChild(img);
            } else {
              const svg = document.createElement("div");
              svg.innerHTML =
                '<svg style="width:24px; fill:#fff" viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z" /></svg>';
              preview.appendChild(svg);
            }
            preview.appendChild(info);
          }
        }
      }

      initDropZone("drop-skin", "skin-file-input");
      initDropZone("drop-ogg", "sound");
      initDropZone("drop-icon", "pack-icon-input");

      function updateMainPreview(blob) {
        const box = document.getElementById("skin-preview");
        box.innerHTML = "";
        const img = document.createElement("img");
        img.src = URL.createObjectURL(blob);
        img.id = "main-preview-img";
        box.appendChild(img);
      }

      async function convertToOgg(rawFile, onProgress) {
        const audioCtx = new (
          window.AudioContext || window.webkitAudioContext
        )();
        const arrayBuffer = await rawFile.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const channel0 = audioBuffer.getChannelData(0);
        let monoData = channel0;
        if (audioBuffer.numberOfChannels > 1) {
          const channel1 = audioBuffer.getChannelData(1);
          monoData = new Float32Array(channel0.length);
          for (let i = 0; i < channel0.length; i++)
            monoData[i] = (channel0[i] + channel1[i]) / 2;
        }
        const encoder = new OggVorbisEncoder(audioBuffer.sampleRate, 1);
        const CHUNK_LEN = audioBuffer.sampleRate * 3;
        for (let i = 0; i < monoData.length; i += CHUNK_LEN) {
          encoder.encode([
            monoData.subarray(i, Math.min(i + CHUNK_LEN, monoData.length)),
          ]);
          onProgress &&
            onProgress(
              Math.round(
                (Math.min(i + CHUNK_LEN, monoData.length) / monoData.length) *
                  100,
              ),
            );
          await new Promise((r) => setTimeout(r, 5));
        }
        return encoder.finish();
      }

      async function fetchSkin() {
        const username = document.getElementById("username-input").value.trim();
        const outerLayer = document.getElementById("outer-layer-check").checked;
        const btn = document.querySelector(".btn-fetch");

        if (!username) return showToast("Enter a username", "error");

        btn.disabled = true;
        btn.textContent = "...";

        // --- LOGIC: Fetch URL based on Checkbox (Outer Layer) ---
        // Armor = Outer layer included. Body = No outer layer.
        let baseUrl = outerLayer
          ? "https://minotar.net/armor/body/"
          : "https://minotar.net/body/";

        // --- LOGIC: Placeholder for Mini vs Full ---
        // If "Mini" is selected, the user asked for a placeholder "Steve" if clicked.
        // But here we are fetching a REAL user.
        // We will fetch the real user regardless, but maybe changing the endpoint slightly
        // (Minotar doesn't really have a 'mini' endpoint, just size).
        // For now, we stick to the standard logic for actual users.
        const url = `${baseUrl}${username}/128.png`;

        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error("Err");
          currentSkinBlob = await res.blob();
          updateMainPreview(currentSkinBlob);

          if (!document.getElementById("pack-name").value)
            document.getElementById("pack-name").value = `${username}'s Totem`;
          showToast("Skin loaded!", "success");

          document.getElementById("skin-file-input").value = "";
          const dropInitial = document.querySelector(
            "#drop-skin .initial-content",
          );
          const dropPreview = document.querySelector(
            "#drop-skin .preview-media-small",
          );
          if (dropInitial) dropInitial.style.display = "flex";
          if (dropPreview) {
            dropPreview.style.display = "none";
            dropPreview.innerHTML = "";
          }
        } catch (err) {
          showToast("User not found", "error");
          currentSkinBlob = null;
        } finally {
          btn.disabled = false;
          btn.textContent = "Load";
        }
      }

      async function generatePack() {
        const version = document.getElementById("version-select").value;
        if (!version) {
          document
            .getElementById("version-select")
            .classList.add("input-error");
          return showToast("Select a version!", "error");
        }
        if (!currentSkinBlob)
          return showToast("Load or upload a skin first!", "error");

        let soundFile = document.getElementById("sound").files[0];
        const modal = document.getElementById("progress-modal");
        if (soundFile && !soundFile.name.endsWith(".ogg")) {
          modal.style.display = "flex";
          try {
            soundFile = await convertToOgg(soundFile, (p) => {
              document.getElementById("progress-bar").style.width = p + "%";
            });
          } catch (err) {
            modal.style.display = "none";
            return showToast("Audio conversion failed", "error");
          }
          modal.style.display = "none";
        }

        const zip = new JSZip();
        const pName =
          document.getElementById("pack-name").value.trim() || "Skin Totem";
        zip.file(
          "pack.mcmeta",
          JSON.stringify(
            {
              pack: {
                pack_format: parseInt(version),
                description:
                  document.getElementById("pack-desc").value.trim() ||
                  "Totem Pack",
              },
            },
            null,
            2,
          ),
        );

        const tFolder = parseInt(version) >= 4 ? "item" : "items";
        const assets = [
          {
            path: `assets/minecraft/textures/${tFolder}/totem_of_undying.png`,
            file: currentSkinBlob,
            default: null,
          },
          {
            path: "assets/minecraft/sounds/item/totem/use_totem.ogg",
            file: soundFile,
            default: DEFAULTS.sound,
          },
          {
            path: "pack.png",
            file:
              document.getElementById("pack-icon-input").files[0] ||
              currentSkinBlob,
            default: DEFAULTS.icon,
          },
        ];

        try {
          await Promise.all(
            assets.map(async (a) => {
              if (a.file) zip.file(a.path, a.file);
              else if (a.default) {
                try {
                  const r = await fetch(a.default);
                  if (r.ok) zip.file(a.path, await r.blob());
                } catch (e) {}
              }
            }),
          );
          zip
            .generateAsync({ type: "blob" })
            .then((c) =>
              saveAs(
                c,
                pName.replace(/[^a-z0-9]/gi, "_").toLowerCase() + ".zip",
              ),
            );
          showToast("Pack Downloaded!", "success");
        } catch (err) {
          showToast("Error generating pack", "error");
        }
      }

      function resetForm() {
        document.getElementById("version-select").selectedIndex = 0;
        document.getElementById("username-input").value = "";
        document.getElementById("pack-name").value = "";
        document.getElementById("pack-desc").value = "";
        document.getElementById("sound").value = "";
        document.getElementById("pack-icon-input").value = "";
        document.getElementById("skin-file-input").value = "";
        document.getElementById("outer-layer-check").checked = true;
        currentSkinBlob = null;

        document
          .querySelectorAll(".initial-content")
          .forEach((el) => (el.style.display = "flex"));
        document.querySelectorAll(".preview-media-small").forEach((el) => {
          el.style.display = "none";
          el.innerHTML = "";
        });

        selectStyle("mini");
        showToast("Reset successful", "success");
      }
    </script>
  </body>
</html>
