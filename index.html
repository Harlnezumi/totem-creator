<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Totem Generator</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.0/FileSaver.min.js"></script>
  <script>var OggVorbisEncoderConfig = { TOTAL_MEMORY: 67108864 };</script>
  <script src="https://cdn.jsdelivr.net/gh/higuma/ogg-vorbis-encoder-js@master/lib/OggVorbisEncoder.js"></script>

  <style>
    :root {
      --primary: #43b581;
      --primary-hover: #3ca374;
      --bg-color: #202225;
      --card-bg: rgba(32, 34, 37, 0.95);
      --input-bg: rgba(0, 0, 0, 0.2);
      --border: rgba(255, 255, 255, 0.1);
      --text-main: #ffffff;
      --text-muted: #b9bbbe;
      --error-color: #ef4444;
      --success-color: #22c55e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg-color);
      background-image: url(background.png);
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      height: 100vh;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      color: var(--text-main);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    /* Navigation */
    .topnav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 70px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 1000;
      background: rgba(32, 34, 37, 0.6);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 40px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 1.4rem;
      letter-spacing: -0.5px;
      text-decoration: none;
    }

    .brand span {
      background: linear-gradient(to bottom, #ffffff, #e2e8f0);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.15));
    }

    .brand img {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(67, 181, 129, 0.4);
    }

    .nav-links {
      display: flex;
      gap: 5px;
    }

    .nav-btn {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .nav-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      color: white;
    }

    .nav-btn.active {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .kofi-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: #FF5E5B;
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255, 94, 91, 0.3);
    }

    .kofi-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 94, 91, 0.5);
    }

    .kofi-btn svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.5;
    }

    /* Toasts */
    #toast-container {
      position: fixed;
      top: 80px;
      right: 20px;
      z-index: 10001;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      min-width: 300px;
      max-width: 400px;
      background: #2f3136;
      border: 1px solid var(--border);
      border-left: 4px solid;
      padding: 16px;
      border-radius: 8px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      transform: translateX(100%);
      animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .toast.error {
      border-left-color: var(--error-color);
    }

    .toast.error svg {
      fill: var(--error-color);
    }

    .toast.success {
      border-left-color: var(--success-color);
    }

    .toast.success svg {
      fill: var(--success-color);
    }

    .toast-content {
      font-size: 0.95rem;
      color: #fff;
      font-weight: 500;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOut {
      to {
        opacity: 0;
        transform: translateX(100%);
      }
    }

    /* Loader */
    #loading-screen {
      position: fixed;
      inset: 0;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .loader {
      width: 60px;
      aspect-ratio: 1;
      --g1: conic-gradient(from 90deg at 3px 3px, #0000 90deg, var(--primary) 0);
      --g2: conic-gradient(from -90deg at 22px 22px, #0000 90deg, var(--primary) 0);
      background: var(--g1), var(--g1), var(--g1), var(--g2), var(--g2), var(--g2);
      background-size: 25px 25px;
      background-repeat: no-repeat;
      animation: l7 1.5s infinite;
    }

    .loader-text {
      font-size: 1.2rem;
      margin-top: 25px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    @keyframes l7 {
      0% {
        background-position: 0 0, 0 100%, 100% 100%;
      }

      25% {
        background-position: 100% 0, 0 100%, 100% 100%;
      }

      50% {
        background-position: 100% 0, 0 0, 100% 100%;
      }

      75% {
        background-position: 100% 0, 0 0, 0 100%;
      }

      100% {
        background-position: 100% 100%, 0 0, 0 100%;
      }
    }

    .fadeOut {
      opacity: 0;
      pointer-events: none;
    }

    /* Main Layout */
    .container {
      position: relative;
      width: 60%;
      margin-top: 70px;
      max-width: 850px;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease forwards 0.5s;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .reset-button {
      position: absolute;
      top: 40px;
      right: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6px 12px;
      gap: 8px;
      height: 34px;
      width: 112px;
      border: none;
      background: rgba(255, 54, 43, 0.2);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s ease;
      z-index: 10;
    }

    .lable {
      line-height: 20px;
      font-size: 17px;
      color: #ff342b;
      letter-spacing: 1px;
    }

    .reset-button:hover {
      background: rgba(255, 54, 43, 0.35);
    }

    .reset-button:hover .svg-icon {
      animation: spin 2s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(-360deg);
      }
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      background: linear-gradient(to right, #fff, #b9bbbe);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    select {
      width: 100%;
      padding: 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: var(--primary);
    }

    optgroup {
      background: #2f3136;
    }

    /* Drag & Drop */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 2rem;
    }

    .drop-zone {
      background: var(--input-bg);
      border: 2px dashed var(--border);
      border-radius: 12px;
      height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--primary);
      background: rgba(67, 181, 129, 0.1);
    }

    .drop-zone input {
      display: none;
    }

    .drop-zone svg {
      width: 48px;
      fill: var(--text-muted);
      margin-bottom: 10px;
      transition: fill 0.3s;
    }

    .drop-zone:hover svg {
      fill: var(--primary);
    }

    .drop-zone p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 5px;
    }

    .drop-zone small {
      color: #72767d;
      font-size: 0.75rem;
    }

    .preview-media {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--card-bg);
      z-index: 2;
    }

    .preview-media img {
      max-height: 80px;
      object-fit: contain;
      margin-bottom: 10px;
    }

    .preview-media audio {
      width: 90%;
      height: 30px;
      margin-bottom: 10px;
    }

    .drop-zone-small {
      height: 140px;
      border-style: dashed;
      background: rgba(0, 0, 0, 0.2);
    }

    .drop-zone-small svg {
      width: 32px;
      margin-bottom: 5px;
    }

    /* Error States */
    .drop-zone.input-error {
      border-color: var(--error-color) !important;
      background: rgba(239, 68, 68, 0.15) !important;
      color: var(--error-color) !important;
    }

    .drop-zone.input-error svg {
      fill: var(--error-color) !important;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      10%,
      30%,
      50%,
      70%,
      90% {
        transform: translateX(-4px);
      }

      20%,
      40%,
      60%,
      80% {
        transform: translateX(4px);
      }
    }

    .shake {
      animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
    }

    /* Ripple Checkbox */
    .checkbox-wrapper {
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      position: relative;
      margin-top: 15px;
      padding: 8px 0;
      width: 100%;
    }

    .checkbox-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
      cursor: pointer;
    }

    .checkbox-visual {
      position: relative;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--text-muted);
      background-color: transparent;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 2;
    }

    .checkbox-wrapper:hover .checkbox-visual {
      border-color: var(--primary);
      box-shadow: 0 0 0 8px rgba(67, 181, 129, 0.15);
    }

    .checkbox-input:checked+.checkbox-visual {
      background-color: var(--primary);
      border-color: var(--primary);
      box-shadow: 0 4px 12px rgba(67, 181, 129, 0.4);
    }

    .checkbox-visual svg {
      width: 14px;
      height: 14px;
      fill: white;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.12, 0.4, 0.29, 1.46);
    }

    .checkbox-input:checked+.checkbox-visual svg {
      opacity: 1;
      transform: scale(1);
    }

    .checkbox-label-content {
      margin-left: 12px;
      display: flex;
      flex-direction: column;
    }

    .checkbox-main-text {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 500;
      transition: color 0.2s;
    }

    .checkbox-input:checked~.checkbox-label-content .checkbox-main-text {
      color: white;
    }

    .checkbox-subtext {
      font-size: 0.75rem;
      color: #72767d;
      font-weight: 400;
      margin-top: 2px;
    }

    .checkbox-container-aligned {
      width: calc(50% - 10px);
      margin-top: -1.5rem;
      margin-bottom: 1.5rem;
    }

    /* Advanced Settings */
    .advanced-settings {
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.15);
      transition: border-color 0.3s;
    }

    .advanced-settings[open] {
      border-color: var(--primary);
    }

    .advanced-settings summary {
      padding: 1rem;
      cursor: pointer;
      font-weight: 700;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: space-between;
      list-style: none;
      transition: color 0.3s;
    }

    .advanced-settings summary:hover {
      color: white;
      background: rgba(255, 255, 255, 0.02);
    }

    .advanced-settings summary::after {
      content: '+';
      font-size: 1.2rem;
      font-weight: bold;
      transition: transform 0.3s;
    }

    .advanced-settings[open] summary::after {
      transform: rotate(45deg);
    }

    .settings-content {
      padding: 1.5rem;
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .settings-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: white;
      font-family: inherit;
      outline: none;
    }

    .settings-input:focus {
      border-color: var(--primary);
    }

    .full-width {
      grid-column: span 2;
    }

    /* Download Button */
    .btn-download {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-download:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    .btn-download:active {
      transform: translateY(0);
    }

    .btn-download svg {
      width: 24px;
      fill: white;
    }

    /* Progress Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 10000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid var(--border);
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .progress-container {
      width: 100%;
      height: 10px;
      background-color: var(--input-bg);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background-color: var(--primary);
      transition: width 0.3s ease;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .topnav {
        padding: 0 1rem;
      }

      .nav-left {
        gap: 15px;
      }

      .brand span,
      .kofi-btn span {
        display: none;
      }

      .kofi-btn {
        padding: 8px;
        border-radius: 8px;
      }
    }

    @media (max-width: 600px) {
      .upload-grid {
        grid-template-columns: 1fr;
      }

      .container {
        padding: 2.5rem;
        margin-top: 110px;
        width: 92%;
      }

      .reset-button {
        position: relative;
        top: auto;
        right: auto;
        margin: 0 auto 20px auto;
      }

      .settings-content {
        grid-template-columns: 1fr;
      }

      .full-width {
        grid-column: span 1;
      }

      .checkbox-container-aligned {
        width: 100%;
        margin-top: 0;
      }
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loader"></div>
    <div class="loader-text">Loading...</div>
  </div>
  <div id="toast-container"></div>

  <div class="topnav">
    <div class="nav-left">
      <a href="index.html" class="brand">
        <img src="avatar.png" alt="Logo" />
        <span>Totem Generator</span>
      </a>
      <nav class="nav-links">
        <a href="index.html" class="nav-btn active">Generator</a>
        <a href="pixel-art.html" class="nav-btn">Pixel Art</a>
      </nav>
    </div>
    <a href="https://ko-fi.com/harinezumi" target="_blank" class="kofi-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8h1a4 4 0 0 1 0 8h-1"></path>
        <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"></path>
        <line x1="6" y1="1" x2="6" y2="4"></line>
        <line x1="10" y1="1" x2="10" y2="4"></line>
        <line x1="14" y1="1" x2="14" y2="4"></line>
      </svg>
      <span>Buy me a Coffee</span>
    </a>
  </div>

  <div class="container">
    <button class="reset-button" onclick="resetForm()" title="Reset all fields">
      <svg class="svg-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff342b" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
        <path d="M3 3v5h5"></path>
      </svg>
      <span class="lable">Reset</span>
    </button>
    <h1>Totem Generator</h1>

    <div class="form-group">
      <label for="version-select">Target Version</label>
      <select id="version-select">
        <option value="" disabled selected>Select Minecraft Version...</option>
        <optgroup label="1.21 (Tricky Trials)">
          <option value="46">1.21.4</option>
          <option value="42">1.21.2 - 1.21.3</option>
          <option value="34">1.21 - 1.21.1</option>
        </optgroup>
        <optgroup label="1.20 (Trails & Tales)">
          <option value="32">1.20.5 - 1.20.6</option>
          <option value="22">1.20.3 - 1.20.4</option>
          <option value="18">1.20.2</option>
          <option value="15">1.20 - 1.20.1</option>
        </optgroup>
        <optgroup label="1.19 (The Wild Update)">
          <option value="13">1.19.4</option>
          <option value="12">1.19.3</option>
          <option value="9">1.19 - 1.19.2</option>
        </optgroup>
        <optgroup label="Older Versions">
          <option value="8">1.18.x</option>
          <option value="7">1.17.x</option>
          <option value="6">1.16.2 - 1.16.5</option>
          <option value="4">1.13 - 1.14.x</option>
          <option value="3">1.11 - 1.12.x</option>
        </optgroup>
      </select>
    </div>

    <div class="upload-grid">
      <label class="drop-zone" id="drop-png">
        <div class="initial-content">
          <svg viewBox="0 0 24 24">
            <path
              d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
          </svg>
          <p><strong>Texture</strong></p>
          <small>Any Image (Auto-converts to PNG)</small>
        </div>
        <div class="preview-media"></div>
        <input type="file" id="image" accept="image/*" />
      </label>

      <label class="drop-zone" id="drop-ogg">
        <div class="initial-content">
          <svg viewBox="0 0 24 24">
            <path
              d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z" />
          </svg>
          <p><strong>Sound</strong></p>
          <small>Any Audio (Auto-converts to OGG)</small>
        </div>
        <div class="preview-media"></div>
        <input type="file" id="sound" accept="audio/*" />
      </label>
    </div>

    <details class="advanced-settings">
      <summary>Advanced Settings</summary>
      <div class="settings-content">

        <div class="form-group full-width">
          <label class="checkbox-wrapper" for="remove-bg-check">
            <input type="checkbox" id="remove-bg-check" class="checkbox-input">
            <div class="checkbox-visual">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                  d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                  clip-rule="evenodd"></path>
              </svg>
            </div>
            <div class="checkbox-label-content">
              <span class="checkbox-main-text">Auto-Remove Background</span>
              <span class="checkbox-subtext">Detects and removes the background color</span>
            </div>
          </label>
        </div>

        <div class="form-group">
          <label for="pack-name">Pack Name</label>
          <input type="text" id="pack-name" class="settings-input" placeholder="e.g. My Custom Totem">
        </div>

        <div class="form-group">
          <label for="pack-desc">Description</label>
          <input type="text" id="pack-desc" class="settings-input" placeholder="e.g. Best pack ever made">
        </div>

        <div class="form-group full-width">
          <label>Pack Icon (Optional, PNG)</label>
          <label class="drop-zone drop-zone-small" id="drop-icon">
            <div class="initial-content">
              <svg viewBox="0 0 24 24">
                <path
                  d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" />
              </svg>
              <p><strong>Pack Icon</strong></p>
              <small>Drag & Drop or Click</small>
            </div>
            <div class="preview-media"></div>
            <input type="file" id="pack-icon-input" accept="image/png" />
          </label>
        </div>

      </div>
    </details>

    <button class="btn-download" onclick="generatePack()">
      <svg viewBox="0 0 24 24">
        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
      </svg>
      Download Resource Pack
    </button>
  </div>

  <div id="progress-modal" class="modal-overlay">
    <div class="modal-content">
      <h3>Converting Audio...</h3>
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <p id="progress-text">0%</p>
    </div>
  </div>

  <script>
    // --- Utils ---
    function showToast(message, type = "error") {
      const container = document.getElementById("toast-container");
      const toast = document.createElement("div");
      toast.className = `toast ${type} opacity-0`;
      const iconPath = type === "error" ? "M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" : "M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z";
      toast.innerHTML = `<svg style="width:24px; height:24px" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="${iconPath}" clip-rule="evenodd"/></svg><span class="toast-content">${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.animation = "slideOut 0.4s ease forwards"; toast.addEventListener("animationend", () => toast.remove()); }, 4000);
    }

    const DEFAULTS = { texture: "./totem.png", sound: "./sound_totem.ogg", icon: "./pack.png" };
    let currentTextureFile = null;

    // --- Init & Listeners ---
    document.addEventListener('DOMContentLoaded', () => {
      const bgCheck = document.getElementById('remove-bg-check');
      if (bgCheck) {
        bgCheck.addEventListener('change', async () => {
          if (currentTextureFile) await updateTexturePreview(currentTextureFile);
        });
      }
    });

    // --- Drag & Drop ---
    function initDropZone(zoneId, inputId) {
      const zone = document.getElementById(zoneId);
      const input = document.getElementById(inputId);
      const preview = zone.querySelector(".preview-media");
      const initial = zone.querySelector(".initial-content");

      let dragCounter = 0;
      let isErrorActive = false;

      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => zone.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false));

      zone.addEventListener('dragenter', () => {
        dragCounter++;
        if (!isErrorActive) zone.classList.add('dragover');
      });

      zone.addEventListener('dragleave', () => {
        dragCounter--;
        if (dragCounter <= 0) { dragCounter = 0; zone.classList.remove('dragover'); }
      });

      zone.addEventListener('drop', (e) => {
        dragCounter = 0;
        zone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
          input.files = e.dataTransfer.files;
          handleFiles(e.dataTransfer.files);
        }
      });

      input.addEventListener("change", (e) => handleFiles(e.target.files));

      function triggerError(msg) {
        isErrorActive = true;
        zone.classList.remove('dragover');
        zone.classList.add("input-error");
        input.value = "";
        zone.classList.add("shake");
        setTimeout(() => zone.classList.remove("shake"), 500);
        showToast(msg, "error");
        setTimeout(() => { zone.classList.remove("input-error"); isErrorActive = false; }, 2000);
      }

      function handleFiles(files) {
        if (!files.length) return;
        const file = files[0];

        if (file.size > 10 * 1024 * 1024) return triggerError("File is too big! Max 10MB.");

        const isImg = inputId === "image" || inputId === "pack-icon-input";
        if (isImg && !file.type.startsWith("image/")) return triggerError("Please upload an image file!");
        if (!isImg && !file.type.startsWith("audio/")) return triggerError("Please upload an audio file!");

        zone.classList.remove("input-error");

        if (inputId === "image") {
          currentTextureFile = file;
          updateTexturePreview(file);
        } else {
          initial.style.display = "none";
          preview.style.display = "flex";
          preview.innerHTML = "";
          const el = isImg ? document.createElement("img") : document.createElement("audio");
          el.src = URL.createObjectURL(file);
          if (!isImg) el.controls = true;
          preview.appendChild(el);
          const name = document.createElement("div");
          name.style.marginTop = "8px"; name.style.fontSize = "0.8rem"; name.textContent = file.name;
          preview.appendChild(name);
        }
      }
    }

    initDropZone("drop-png", "image");
    initDropZone("drop-ogg", "sound");
    initDropZone("drop-icon", "pack-icon-input");

    window.addEventListener("load", () => {
      document.getElementById("version-select").addEventListener("change", function () { this.classList.remove("input-error"); });
      setTimeout(() => { document.getElementById("loading-screen").classList.add("fadeOut"); setTimeout(() => document.getElementById("loading-screen").style.display = "none", 800); }, 800);
    });

    // --- Processing ---
    async function convertToOgg(rawFile, onProgress) {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const arrayBuffer = await rawFile.arrayBuffer();
      const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
      const channel0 = audioBuffer.getChannelData(0);
      let monoData = channel0;
      if (audioBuffer.numberOfChannels > 1) {
        const channel1 = audioBuffer.getChannelData(1);
        monoData = new Float32Array(channel0.length);
        for (let i = 0; i < channel0.length; i++) monoData[i] = (channel0[i] + channel1[i]) / 2;
      }
      const encoder = new OggVorbisEncoder(audioBuffer.sampleRate, 1);
      const CHUNK_LEN = audioBuffer.sampleRate * 3;
      for (let i = 0; i < monoData.length; i += CHUNK_LEN) {
        encoder.encode([monoData.subarray(i, Math.min(i + CHUNK_LEN, monoData.length))]);
        onProgress && onProgress(Math.round((Math.min(i + CHUNK_LEN, monoData.length) / monoData.length) * 100));
        await new Promise(r => setTimeout(r, 5));
      }
      return encoder.finish();
    }

    function convertToPng(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
          const size = Math.max(img.width, img.height);
          const canvas = document.createElement("canvas");
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2);
          canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("Failed")), "image/png");
        };
        img.onerror = reject;
      });
    }

    function removeBackground(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.src = URL.createObjectURL(file);
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = img.width; canvas.height = img.height;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0);
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
          const rBg = data[0], gBg = data[1], bBg = data[2];
          const tolerance = 25;
          for (let i = 0; i < data.length; i += 4) {
            if (Math.abs(data[i] - rBg) + Math.abs(data[i + 1] - gBg) + Math.abs(data[i + 2] - bBg) < tolerance && data[i + 3] > 0) data[i + 3] = 0;
          }
          ctx.putImageData(new ImageData(data, canvas.width, canvas.height), 0, 0);
          canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error("BG Fail")), "image/png");
        };
        img.onerror = reject;
      });
    }

    async function updateTexturePreview(file) {
      const zone = document.getElementById('drop-png');
      const preview = zone.querySelector(".preview-media");
      const initial = zone.querySelector(".initial-content");
      const isRemoveBg = document.getElementById('remove-bg-check').checked;

      preview.style.opacity = "0.5";
      let fileToRender = file;
      if (isRemoveBg) {
        try { fileToRender = await removeBackground(file); } catch (e) { console.error(e); }
      }

      initial.style.display = "none";
      preview.style.display = "flex";
      preview.style.opacity = "1";
      preview.innerHTML = "";

      const img = document.createElement("img");
      img.src = URL.createObjectURL(fileToRender);
      img.style.backgroundImage = "conic-gradient(#2f3136 90deg, #202225 90deg 180deg, #2f3136 180deg 270deg, #202225 270deg)";
      img.style.backgroundSize = "20px 20px";
      img.style.borderRadius = "4px";
      img.style.boxShadow = "0 4px 6px rgba(0,0,0,0.3)";
      preview.appendChild(img);

      const name = document.createElement("div");
      name.style.fontSize = "0.8rem"; name.style.marginTop = "8px";
      name.textContent = file.name + (isRemoveBg ? " (Processed)" : "");
      preview.appendChild(name);
    }

    async function generatePack() {
      const version = document.getElementById("version-select").value;
      if (!version) { document.getElementById("version-select").classList.add("input-error"); return showToast("Please select a version first!", "error"); }

      const imageInput = document.getElementById("image").files[0];
      const removeBgChecked = document.getElementById("remove-bg-check").checked;
      let finalImageFile = imageInput;

      if (imageInput) {
        try {
          if (removeBgChecked) { showToast("Removing background...", "info"); finalImageFile = await removeBackground(imageInput); }
          else { finalImageFile = await convertToPng(imageInput); }
        } catch (e) { return showToast("Failed to process image.", "error"); }
      }

      let soundFile = document.getElementById("sound").files[0];
      if (soundFile && !soundFile.name.endsWith(".ogg")) {
        const modal = document.getElementById("progress-modal");
        const bar = document.getElementById("progress-bar");
        const text = document.getElementById("progress-text");
        modal.style.display = "flex";
        try {
          soundFile = await convertToOgg(soundFile, (p) => { bar.style.width = p + "%"; text.innerText = p + "%"; });
          showToast("Audio converted!", "success");
        } catch (err) { modal.style.display = "none"; return showToast("Audio conversion failed!", "error"); }
        modal.style.display = "none"; bar.style.width = "0%";
      }

      const zip = new JSZip();
      zip.file("pack.mcmeta", JSON.stringify({ pack: { pack_format: parseInt(version), description: document.getElementById("pack-desc").value.trim() || "Custom Totem Pack" } }, null, 2));

      const textureFolder = parseInt(version) >= 4 ? "item" : "items";
      const assets = [
        { path: `assets/minecraft/textures/${textureFolder}/totem_of_undying.png`, file: finalImageFile, default: DEFAULTS.texture },
        { path: "assets/minecraft/sounds/item/totem/use_totem.ogg", file: soundFile, default: DEFAULTS.sound },
        { path: "pack.png", file: document.getElementById("pack-icon-input").files[0] || finalImageFile, default: DEFAULTS.icon }
      ];

      try {
        await Promise.all(assets.map(async (asset) => {
          if (asset.file) zip.file(asset.path, asset.file);
          else { try { const res = await fetch(asset.default); if (res.ok) zip.file(asset.path, await res.blob()); } catch (e) { } }
        }));
        zip.generateAsync({ type: "blob" }).then((content) => {
          saveAs(content, (document.getElementById("pack-name").value.trim().replace(/[^a-z0-9]/gi, '_').toLowerCase() || "totem_pack") + ".zip");
          showToast("Pack Generated Successfully!", "success");
        });
      } catch (err) { showToast("Error: " + err.message, "error"); }
    }

    function resetForm() {
      document.getElementById("version-select").selectedIndex = 0;
      document.getElementById("image").value = "";
      document.getElementById("sound").value = "";
      document.getElementById("pack-icon-input").value = "";
      document.getElementById("pack-name").value = "";
      document.getElementById("pack-desc").value = "";
      document.getElementById("remove-bg-check").checked = false;
      currentTextureFile = null;

      ["drop-png", "drop-ogg", "drop-icon"].forEach(id => {
        const zone = document.getElementById(id);
        zone.classList.remove("input-error");
        zone.querySelector(".initial-content").style.display = "block";
        zone.querySelector(".preview-media").style.display = "none";
        zone.querySelector(".preview-media").innerHTML = "";
      });
      showToast("All fields reset", "success");
    }
  </script>
</body>

</html>
