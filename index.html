    <script>
      function showToast(message, type = "error") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        let svgPath =
          type === "error"
            ? "M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
            : "M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z";
        if (type === "info")
          svgPath =
            "M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z";

        toast.innerHTML = `<svg style="width:24px; height:24px" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="${svgPath}" clip-rule="evenodd"/></svg><span class="toast-content">${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = "slideOut 0.4s ease forwards";
          toast.addEventListener("animationend", () => toast.remove());
        }, 4000);
      }

      // dropdown accordion config
      function closeOtherDropdowns(current, selector) {
        document.querySelectorAll(selector).forEach((cb) => {
          if (cb !== current) {
            cb.checked = false;
            cb.classList.remove("drop-up-active");
            const menu = cb
              .closest(".pure-dropdown-container")
              ?.querySelector(".section-dropdown");
            if (menu) menu.classList.remove("drop-up");
          }
        });
      }

      function calculateDropdownPosition(cb) {
        const container = cb.closest(".pure-dropdown-container");
        const menu = container.querySelector(".section-dropdown");
        const trigger = container.querySelector(".for-dropdown");
        if (!menu || !trigger) return;

        menu.classList.remove("drop-up");
        cb.classList.remove("drop-up-active");

        const triggerRect = trigger.getBoundingClientRect();
        const menuHeight = Math.max(menu.scrollHeight, 250);

        // flip upwards if no space on screen
        if (triggerRect.bottom + menuHeight > window.innerHeight - 20) {
          menu.classList.add("drop-up");
          cb.classList.add("drop-up-active");
        }
      }

      function closeAllDropdowns() {
        document.querySelectorAll(".dropdown, .dropdown-sub").forEach((cb) => {
          cb.checked = false;
          cb.classList.remove("drop-up-active");
          const menu = cb
            .closest(".pure-dropdown-container")
            ?.querySelector(".section-dropdown");
          if (menu) menu.classList.remove("drop-up");
        });
      }

      function selectVersion(val, text) {
        document.getElementById("version-select").value = val;
        document.getElementById("version-label-text").textContent = text;
        document
          .getElementById("version-dropdown-label")
          .classList.remove("input-error");
        closeAllDropdowns();
      }

      document.addEventListener("DOMContentLoaded", () => {
        const bgCheck = document.getElementById("remove-bg-check");
        if (bgCheck) {
          bgCheck.addEventListener("change", async () => {
            if (currentTextureFile)
              await updateTexturePreview(currentTextureFile);
          });
        }
      });

      window.addEventListener("load", () => {
        setTimeout(() => {
          document.getElementById("loading-screen").classList.add("fadeOut");
          setTimeout(
            () =>
              (document.getElementById("loading-screen").style.display =
                "none"),
            800,
          );
        }, 800);

        document.querySelectorAll(".dropdown").forEach((cb) => {
          cb.addEventListener("change", function () {
            if (this.checked) {
              closeOtherDropdowns(this, ".dropdown");
              calculateDropdownPosition(this);
            } else {
              this.classList.remove("drop-up-active");
              const menu =
                this.parentElement.querySelector(".section-dropdown");
              if (menu) menu.classList.remove("drop-up");
              const subs = this.parentElement.querySelectorAll(".dropdown-sub");
              subs.forEach((sub) => (sub.checked = false));
            }
          });
        });

        document.querySelectorAll(".dropdown-sub").forEach((cb) => {
          cb.addEventListener("change", function () {
            if (this.checked) closeOtherDropdowns(this, ".dropdown-sub");
          });
        });

        window.addEventListener("resize", () => {
          document
            .querySelectorAll(".dropdown:checked")
            .forEach((cb) => calculateDropdownPosition(cb));
        });

        document.addEventListener("click", function (e) {
          if (!e.target.closest(".pure-dropdown-container"))
            closeAllDropdowns();
        });
      });

      // handles drag and drop interactions
      function initDropZone(zoneId, inputId) {
        const zone = document.getElementById(zoneId);
        const input = document.getElementById(inputId);
        const isExtra = zone.classList.contains("drop-zone-extra");
        const preview = zone.querySelector(
          isExtra ? ".preview-media-small" : ".preview-media",
        );
        const initial = zone.querySelector(".initial-content");

        let dragCounter = 0;
        let isErrorActive = false;

        ["dragenter", "dragover", "dragleave", "drop"].forEach((eventName) =>
          zone.addEventListener(
            eventName,
            (e) => {
              e.preventDefault();
              e.stopPropagation();
            },
            false,
          ),
        );

        zone.addEventListener("dragenter", () => {
          dragCounter++;
          if (!isErrorActive) zone.classList.add("dragover");
        });
        zone.addEventListener("dragleave", () => {
          dragCounter--;
          if (dragCounter <= 0) {
            dragCounter = 0;
            zone.classList.remove("dragover");
          }
        });

        zone.addEventListener("drop", (e) => {
          dragCounter = 0;
          zone.classList.remove("dragover");
          if (e.dataTransfer.files.length) {
            input.files = e.dataTransfer.files;
            handleFiles(e.dataTransfer.files);
          }
        });

        input.addEventListener("change", (e) => handleFiles(e.target.files));

        function triggerError(msg) {
          isErrorActive = true;
          zone.classList.remove("dragover");
          zone.classList.add("input-error", "shake");
          input.value = "";
          showToast(msg, "error");
          setTimeout(() => zone.classList.remove("shake"), 500);
          setTimeout(() => {
            zone.classList.remove("input-error");
            isErrorActive = false;
          }, 2000);
        }

        function handleFiles(files) {
          if (!files.length) return;
          const file = files[0];

          if (file.size > 10 * 1024 * 1024)
            return triggerError("File is too big! Max 10MB.");

          const isImg = inputId === "image" || inputId === "pack-icon-input";
          if (isImg && !file.type.startsWith("image/"))
            return triggerError("Please upload an image file!");
          if (!isImg && !file.type.startsWith("audio/"))
            return triggerError("Please upload an audio file!");

          zone.classList.remove("input-error");

          if (inputId === "image") {
            currentTextureFile = file;
            updateTexturePreview(file);
          } else {
            initial.style.display = "none";
            preview.style.display = "flex";
            preview.innerHTML = "";

            if (inputId === "sound") {
              const el = document.createElement("audio");
              el.src = URL.createObjectURL(file);
              el.controls = true;
              preview.appendChild(el);
            } else if (isExtra && isImg) {
              const el = document.createElement("img");
              el.src = URL.createObjectURL(file);
              preview.appendChild(el);
            }

            const name = document.createElement("div");
            name.className = isExtra ? "file-name-small" : "";
            if (!isExtra) {
              name.style.marginTop = "8px";
              name.style.fontSize = "0.8rem";
              name.style.color = "var(--text-main)";
            }
            name.textContent = file.name;
            preview.appendChild(name);
          }
        }
      }

      initDropZone("drop-png", "image");
      initDropZone("drop-ogg", "sound");
      initDropZone("drop-icon", "pack-icon-input");

      // encode uploaded audio
      async function convertToOgg(rawFile, onProgress) {
        const audioCtx = new (
          window.AudioContext || window.webkitAudioContext
        )();
        const arrayBuffer = await rawFile.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const channel0 = audioBuffer.getChannelData(0);
        let monoData = channel0;
        if (audioBuffer.numberOfChannels > 1) {
          const channel1 = audioBuffer.getChannelData(1);
          monoData = new Float32Array(channel0.length);
          for (let i = 0; i < channel0.length; i++)
            monoData[i] = (channel0[i] + channel1[i]) / 2;
        }
        const encoder = new OggVorbisEncoder(audioBuffer.sampleRate, 1);
        const CHUNK_LEN = audioBuffer.sampleRate * 3;
        for (let i = 0; i < monoData.length; i += CHUNK_LEN) {
          encoder.encode([
            monoData.subarray(i, Math.min(i + CHUNK_LEN, monoData.length)),
          ]);
          if (onProgress)
            onProgress(
              Math.round(
                (Math.min(i + CHUNK_LEN, monoData.length) / monoData.length) *
                  100,
              ),
            );
          await new Promise((r) => setTimeout(r, 5));
        }
        return encoder.finish();
      }

      function convertToPng(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.src = URL.createObjectURL(file);
          img.onload = () => {
            const size = Math.max(img.width, img.height);
            const canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, (img.width - size) / 2, (img.height - size) / 2);
            canvas.toBlob(
              (blob) => (blob ? resolve(blob) : reject(new Error("Failed"))),
              "image/png",
            );
          };
          img.onerror = reject;
        });
      }

      function removeBackground(file) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.src = URL.createObjectURL(file);
          img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);
            const data = ctx.getImageData(
              0,
              0,
              canvas.width,
              canvas.height,
            ).data;
            const rBg = data[0],
              gBg = data[1],
              bBg = data[2];
            const tolerance = 25;
            for (let i = 0; i < data.length; i += 4) {
              if (
                Math.abs(data[i] - rBg) +
                  Math.abs(data[i + 1] - gBg) +
                  Math.abs(data[i + 2] - bBg) <
                  tolerance &&
                data[i + 3] > 0
              )
                data[i + 3] = 0;
            }
            ctx.putImageData(
              new ImageData(data, canvas.width, canvas.height),
              0,
              0,
            );
            canvas.toBlob(
              (blob) => (blob ? resolve(blob) : reject(new Error("BG Fail"))),
              "image/png",
            );
          };
          img.onerror = reject;
        });
      }

      async function updateTexturePreview(file) {
        const zone = document.getElementById("drop-png");
        const preview = zone.querySelector(".preview-media");
        const initial = zone.querySelector(".initial-content");
        const isRemoveBg = document.getElementById("remove-bg-check").checked;

        preview.style.opacity = "0.5";
        let fileToRender = file;
        if (isRemoveBg) {
          try {
            fileToRender = await removeBackground(file);
          } catch (e) {
            console.error(e);
          }
        }

        initial.style.display = "none";
        preview.style.display = "flex";
        preview.style.opacity = "1";
        preview.innerHTML = "";

        const img = document.createElement("img");
        img.src = URL.createObjectURL(fileToRender);
        img.style.backgroundImage =
          "conic-gradient(var(--card-bg) 90deg, var(--input-bg) 90deg 180deg, var(--card-bg) 180deg 270deg, var(--input-bg) 270deg)";
        img.style.backgroundSize = "20px 20px";
        preview.appendChild(img);

        const name = document.createElement("div");
        name.style.fontSize = "0.8rem";
        name.style.marginTop = "8px";
        name.style.color = "var(--text-main)";
        name.textContent = file.name + (isRemoveBg ? " (Processed)" : "");
        preview.appendChild(name);
      }

      // handles resource pack creation
      async function generatePack() {
        const version = document.getElementById("version-select").value;
        if (!version) {
          document
            .getElementById("version-dropdown-label")
            .classList.add("input-error");
          return showToast("Select a version!", "error");
        }

        const imageInput = document.getElementById("image").files[0];
        const removeBgChecked =
          document.getElementById("remove-bg-check").checked;
        let finalImageFile = imageInput;

        if (imageInput) {
          try {
            if (removeBgChecked) {
              showToast("Removing background...", "info");
              finalImageFile = await removeBackground(imageInput);
            } else {
              finalImageFile = await convertToPng(imageInput);
            }
          } catch (e) {
            return showToast("Failed to process image.", "error");
          }
        }

        let soundFile = document.getElementById("sound").files[0];
        if (soundFile && !soundFile.name.endsWith(".ogg")) {
          const modal = document.getElementById("progress-modal");
          const bar = document.getElementById("progress-bar");
          const text = document.getElementById("progress-text");
          modal.style.display = "flex";
          try {
            soundFile = await convertToOgg(soundFile, (p) => {
              bar.style.width = p + "%";
              text.innerText = p + "%";
            });
            showToast("Audio converted!", "success");
          } catch (err) {
            modal.style.display = "none";
            bar.style.width = "0%";
            text.innerText = "0%";
            return showToast("Audio conversion failed!", "error");
          }
          modal.style.display = "none";
          bar.style.width = "0%";
          text.innerText = "0%";
        }

        const zip = new JSZip();
        const pName =
          document.getElementById("pack-name").value.trim() ||
          "Custom Totem Pack";
        zip.file(
          "pack.mcmeta",
          JSON.stringify(
            {
              pack: {
                pack_format: parseInt(version),
                description:
                  document.getElementById("pack-desc").value.trim() ||
                  "Totem Pack",
              },
            },
            null,
            2,
          ),
        );

        const tFolder = parseInt(version) >= 4 ? "item" : "items";
        const assets = [
          {
            path: `assets/minecraft/textures/${tFolder}/totem_of_undying.png`,
            file: finalImageFile,
            default: DEFAULTS.texture,
          },
          {
            path: "assets/minecraft/sounds/item/totem/use_totem.ogg",
            file: soundFile,
            default: DEFAULTS.sound,
          },
          {
            path: "pack.png",
            file:
              document.getElementById("pack-icon-input").files[0] ||
              finalImageFile,
            default: DEFAULTS.icon,
          },
        ];

        try {
          await Promise.all(
            assets.map(async (a) => {
              if (a.file) zip.file(a.path, a.file);
              else {
                try {
                  const res = await fetch(a.default);
                  if (res.ok) zip.file(a.path, await res.blob());
                } catch (e) {}
              }
            }),
          );
          zip
            .generateAsync({ type: "blob" })
            .then((c) =>
              saveAs(
                c,
                pName.replace(/[^a-z0-9]/gi, "_").toLowerCase() + ".zip",
              ),
            );
          showToast("Pack Downloaded!", "success");
        } catch (err) {
          showToast("Error generating pack", "error");
        }
      }

      function resetForm() {
        document.getElementById("image").value = "";
        document.getElementById("sound").value = "";
        document.getElementById("pack-icon-input").value = "";
        document.getElementById("pack-name").value = "";
        document.getElementById("pack-desc").value = "";
        document.getElementById("remove-bg-check").checked = false;
        currentTextureFile = null;

        document.getElementById("version-select").value = "";
        document.getElementById("version-label-text").textContent =
          "Select Minecraft Version...";

        ["drop-png", "drop-ogg", "drop-icon"].forEach((id) => {
          const zone = document.getElementById(id);
          zone.classList.remove("input-error", "shake");
          zone.querySelector(".initial-content").style.display = "flex";

          const preview = zone.querySelector(
            zone.classList.contains("drop-zone-extra")
              ? ".preview-media-small"
              : ".preview-media",
          );
          if (preview) {
            preview.style.display = "none";
            preview.innerHTML = "";
          }
        });

        document.getElementById("advanced-toggle").checked = false;
        closeAllDropdowns();
        showToast("All fields reset", "success");
      }
    </script>
  </body>
</html>
